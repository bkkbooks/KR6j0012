body:
  text: 力三昧法界生􅁤法輪大惠刀􅗭􅗭法螺蓮花金剛大惠如來頂毫相大鉢施無畏􅞣與願怖魔悲生願索􅝩􅗭鉤􅞣􅝩如來心臍腰藏􅞣大結界無堪忍大護􅞣􅞣􅝯􅗭普光如來甲如來舌􅁰如來語如來牙􅞣如來辨說􅁤如來十力􅁥如來念處􅁤平等開悟􅝝如來昧􅗭慈氏菩薩虛空藏除蓋障觀自在得大勢至多羅菩薩毗俱胝白處尊何耶𮓌哩婆地藏菩薩曼珠室哩􅁦􅋌􅋌光網菩薩􅁤􅁦無垢光􅋌􅁥計設尼􅋌烏波計始儞地惠幢􅋌請召童子􅞻􅞻不思議童子大愛樂亦名除疑怪施無畏除惡趣救護惠􅋌大慈生􅁤悲施潤除一切熱惱不思議惠􅞤地藏旗􅋌寶處寶手持地寶印手􅑈堅固意虛空無垢虛空惠蓮花印清淨惠􅝝行惠同前金剛手執金剛金剛拳無能勝􅞣􅞻阿毗目佉􅋌釋迦牟尼鉢􅝝一切佛頂阿修羅乾闥婆藥叉藥叉女毗舍遮毗舍𨑤一切執曜􅝩一切宿命􅢢諸羅剎娑諸荼吉尼字輪第五卷短呼皆上聲此一轉長呼也此去聲右此一轉第一轉皆帶右此一轉聲呼皆入右一轉大真言王􅝝生金剛不壞蓮花藏萬德莊嚴一切支分生世尊陀羅尼􅞭法住真言迅疾持真言百光通照下第六卷加持句真言􅝝書本云長承二年九月一日以御筆本奉書寫畢云云件本隆海僧都本云云交了興然本
