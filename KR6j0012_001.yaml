body:
  text: 灑淨真言持地真言曰􅋌持香水真言曰押紙已下經二具緣品􅍉略奉持護摩真言曰􅟇大力大護明妃真言曰􅞣􅝯入佛三昧耶真言曰法界生真言曰金剛薩埵真言曰金剛鎧真言曰如來眼真言曰􅧩塗香真言曰華供養真言曰燒香真言曰飲食真言曰􅛈燈明真言曰􅗗􅝩閼伽真言曰如來頂相真言曰如來甲真言曰如來舌真言􅁰􅝝如來圓光真言曰􅗗無礙力真言曰押紙云已下第二卷普通真言藏品􅝝􅗭彌勒菩薩真言曰虛空藏真言曰除蓋障真言曰觀自在真言曰得大勢至真言曰多羅尊真言曰毗俱胝真言曰白處尊真言曰何耶揭嘌嚩真言曰地藏菩薩真言曰文殊師利真言曰􅁦􅋌金剛手真言曰忙莾計真言曰金剛鎖真言曰金剛月靨真言曰金剛針真言曰􅞣一切持金剛真言曰一切奉教真言曰􅞣􅁥釋迦牟尼真言曰毫相真言曰一切諸佛頂真言曰無能勝真言曰無能勝妃真言曰地神真言曰毗紐天真言曰伊舍那天真言曰風神真言曰六美音天羅剎主真言曰四閻魔真言曰􅁤三死王真言曰黑夜神真言曰七母等真言曰釋提桓因真言曰嚩嚕拏龍真言曰五梵天真言曰日天真言曰月天真言十諸龍真言難陀跋難陀真言曰虛空眼明妃真言曰不動主真言曰降三世真言曰􅋌􅞣聲聞真言曰􅗭緣覺真言曰普一切諸佛菩薩心真言曰􅞣􅞣普世明妃真言曰􅞤􅞻一切諸佛真言曰􅗭不可越守護門真言曰􅛔􅞻相向守護門真言曰􅋌大結界真言曰􅗭􅋌􅝝菩提心真言菩提行真言成菩提真言曰涅槃真言曰􅞤降三世真言曰不動尊真言曰無動尊真言曰除蓋障真言曰􅞣除蓋障真言曰觀自在真言曰金剛手真言曰文殊師利真言曰虛空眼真言曰法界真言曰大勤勇真言水自在真言曰多羅尊真言曰毗俱胝真言曰得大勢至真言曰白處尊真言曰何耶揭嘌嚩真言曰耶輸陀羅真言曰寶手真言􅑈光網真言曰釋迦牟尼真言曰佛頂真言曰白傘蓋佛頂真言曰勝佛頂真言曰最勝佛頂真言曰光聚佛頂真言除障佛頂真言世明妃真言曰無能勝真言曰地神真言曰計設尼真言曰烏婆計設尼真言曰質多羅童子真言曰財惠童子真言曰除疑怪真言曰施一切衆生無畏真言曰除一切惡趣真言曰哀愍惠真言曰大慈生真言大纏真言曰除一切熱惱真言曰􅞣不可思議真言曰地藏旗真言曰寶處真言曰寶手真言曰􅑈持地真言曰寶印手真言曰􅑈堅固意真言曰虛空無垢真言曰虛空惠真言曰清淨惠真言曰行真言曰惠真言曰諸菩薩所説真言曰淨居真言曰􅝝淨居天真言曰羅剎娑真言曰諸荼吉尼真言曰藥叉女真言曰諸毗舍遮真言曰諸部多羅真言曰諸阿修羅真言曰諸摩睺囉伽真言曰摩睺羅伽真言曰諸緊那羅真言曰諸人真言曰􅁤無所不至真言曰已下第三卷押紙云已下第三卷悉地出現品􅞣空藏明妃真言曰滿足一切金剛字句真言曰無礙力明妃真言曰押紙云已下第三卷轉字輪行品救世者真言曰無能害力明妃真言曰􅞣􅞣􅋌􅞣置字句已下第四卷
